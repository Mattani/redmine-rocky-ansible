- name: Rubyがインストールされているか確認
  shell: source ~/.bashrc && ruby -v
  register: ruby_version_output
  ignore_errors: yes

- name: Debug message
  debug:
    msg: "Ruby version: {{ ruby_version_output.stdout }}"

- name: Check if Ruby is installed
  ansible.builtin.set_fact:
    ruby_installed: "{{ ruby_version_output.rc == 0 }}"

- name: Debug message
  debug:
    msg: "Ruby is {{ 'installed' if ruby_installed else 'not installed' }}"

- name: Clone rbenv from GitHub
  git:
    repo: https://github.com/rbenv/rbenv.git
    dest: /usr/local/rbenv
    update: no
  become: yes
  when: not ruby_installed


- name: Set up rbenv initialization for root
  become: yes
  copy:
    dest: /etc/profile.d/rbenv.sh
    content: |
      export RBENV_ROOT=/usr/local/rbenv
      export PATH="$RBENV_ROOT/bin:$PATH"
      eval "$(rbenv init -)"
    owner: root
    group: root
    mode: '0755'

- name: Install ruby-build plugin
  git:
    repo: https://github.com/rbenv/ruby-build.git
    dest: /usr/local/rbenv/plugins/ruby-build
    update: no
  become: yes
  when: not ruby_installed

- name: OpenSSLバージョンとRubyバージョンの条件分岐処理
  include_tasks: openssl_check.yml

- name: Install libyaml-devel
  become: yes
  yum:
    name='libyaml-devel'

- name: Ensure rbenv is initialized
  become: yes
  shell: |
    source /etc/profile.d/rbenv.sh
    rbenv rehash
  args:
    executable: /bin/bash

- name: Check if Ruby {{ ruby_version }} is installed
  become: yes
  shell: |
    source /etc/profile.d/rbenv.sh
    rbenv versions --bare
  register: ruby_versions

- name: Install Ruby {{ ruby_version }}
  become: yes
  vars:
    ansible_python_interpreter: /usr/bin/python3.9
  shell: |
    source /etc/profile.d/rbenv.sh
    {{ 'RUBY_CONFIGURE_OPTS="' + ruby_configure_opts + '" ' if ruby_configure_opts|length > 0 else '' }}rbenv install {{ ruby_version }}
  args:
    creates: "/usr/local/rbenv/versions/{{ ruby_version }}/bin/ruby"
  async: 3600
  poll: 10
  when: ruby_version not in ruby_versions.stdout_lines

- name: Set Ruby {{ ruby_version }} as global default
  become: yes
  shell: |
    source /etc/profile.d/rbenv.sh
    rbenv global {{ ruby_version }}

- name: Rehash rbenv
  become: yes
  shell: |
    source /etc/profile.d/rbenv.sh
    rbenv rehash

- name: Verify Ruby installation
  become: yes
  shell: |
    source /etc/profile.d/rbenv.sh
    ruby -v

